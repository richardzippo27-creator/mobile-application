<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question 2 - Sign In with Modal</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: Arial, sans-serif;
    }

    /* ── Sign-In Card ── */
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), 0 2px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card h2 {
      text-align: center;
      color: #333;
      font-size: 22px;
    }

    .card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .card input:focus {
      border-color: #4a90e2;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 2px solid #4a90e2;
      color: #4a90e2;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: #e8f0fb;
    }

    /* TouchableOpacity / Pressable feel */
    .btn-signin {
      flex: 1;
      padding: 12px;
      background: #4a90e2;
      border: none;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-signin:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      width: 320px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-icon {
      font-size: 48px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #2ecc71;
      text-align: center;
    }

    .modal-msg {
      font-size: 14px;
      color: #666;
      text-align: center;
    }

    .btn-close {
      padding: 11px 28px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
    }

    .btn-close:active {
      opacity: 0.7;
      transform: scale(0.97);
    }
  </style>
</head>
<body>

<!-- Sign-In Card -->
<div class="card" id="signinCard">
  <h2>Sign In</h2>
  <input type="text"     id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />
  <div class="btn-row">
    <button class="btn-cancel"  id="cancelBtn">Cancel</button>
    <button class="btn-signin"  id="signinBtn">Sign In</button>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">&#10003;</div>
    <p class="modal-title">Signed In Successfully</p>
    <p class="modal-msg">Welcome! You have been signed in.</p>
    <button class="btn-close" id="closeModalBtn">Close</button>
  </div>
</div>

<script>
  $('#signinBtn').on('click', function () {
    $('#modalOverlay').addClass('active');
  });

  $('#closeModalBtn').on('click', function () {
    $('#modalOverlay').removeClass('active');
  });

  // Close modal on overlay click (outside the modal box)
  $('#modalOverlay').on('click', function (e) {
    if ($(e.target).is('#modalOverlay')) {
      $('#modalOverlay').removeClass('active');
    }
  });

  $('#cancelBtn').on('click', function () {
    $('#username').val('');
    $('#password').val('');
  });
</script>

</body>
</html>
